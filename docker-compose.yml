# Local development backbone for RitcherMap.
#
# Brings up the shared infrastructure the services point at via env vars:
#   - PostgreSQL + PostGIS  (spatial source of truth; catalog's Flyway owns the schema)
#   - Redis                 (cache + pub/sub)
#   - Kafka                 (cross-service events, KRaft single-node)
#   - MinIO                 (S3-compatible tile storage)
#
# Each service keeps its native toolchain (Cargo / Gradle / pip / go / bundler)
# and runs against this infra — see each service's README. (This replaces an
# earlier stale compose that referenced services which no longer exist.)
#
#   docker compose up -d        # start infra
#   docker compose down         # stop
#   docker compose down -v      # stop + wipe volumes
#
# For running the *test suites* in containers, use docker-compose.test.yml.
name: ritchermap

services:
  db:
    build:
      context: .
      dockerfile: Dockerfile-db
    # Defaults chosen to match catalog's application.yml so it connects with no
    # extra env (DATABASE_URL=jdbc:postgresql://localhost:5432/mapgenie).
    environment:
      POSTGRES_DB: mapgenie
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  kafka:
    image: apache/kafka:3.8.0
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: "1"
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:CONTROLLER
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "1"

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # web console
    volumes:
      - minio_data:/data

volumes:
  db_data:
  redis_data:
  minio_data:
