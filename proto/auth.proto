syntax = "proto3";

package ritchermap.auth.v1;

option go_package = "github.com/ritchermap/proto/gen/go/ritchermap/auth/v1;authv1";
option java_package = "com.ritchermap.proto.auth.v1";
option java_multiple_files = true;

// Canonical definition of the session-token claims shared by the accounts
// service (Rails, issuer) and the gateway (Go, validator).
//
// IMPORTANT: tokens are encoded as JWT (RFC 7519 / JSON), NOT protobuf binary.
// This message is the single source of truth for claim NAMES and TYPES; each
// service maps it to/from the JWT payload. It replaces the
// contract-by-convention that previously lived only in comments in
// JwtService.rb and gateway/internal/auth.
//
// The `premium` claim closes the premium-enforcement gap: the gateway can gate
// free-tier tracking limits from the token, without a synchronous call back to
// accounts on every progress write.
message SessionClaims {
  string sub = 1;     // user id (UUID string)
  int64 exp = 2;      // expiry, unix seconds (gateway requires this)
  int64 iat = 3;      // issued-at, unix seconds
  bool premium = 4;   // subscription tier flag, resolved by accounts at login
}
